<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
   <!-- title-->
    <title>See 'N Say Storymaker</title>
    <link rel="stylesheet" href="style.css">
    <script src="./JS/script.js" defer></script>
</head>
<body>
    <div class="book-container">
        <div class="page left-page">
            <!-- col1 who-->
            <div class="column purple" id="col-1">
                <div class="col-num">1</div>
                <div class="word-list">
                    <span>The turkey</span><span>Mom</span><span>Dad</span><span>The dog</span>
                    <span>My teacher</span><span>The elephant</span><span>The cat</span>
                </div>
                <div class="selection-box" id="n1Display">Who?</div>
            </div>
            <!-- col2 did-->
            <div class="column cyan" id="col-2">
                <div class="col-num">2</div>
                <div class="word-list">
                    <span>sat on</span><span>ate</span><span>danced with</span><span>saw</span>
                    <span>doesn't like</span><span>kissed</span>
                </div>
                <div class="selection-box" id="verbDisplay">Did?</div>
            </div>
            <!-- col3 how-->
            <div class="column lime" id="col-3">
                <div class="col-num">3</div>
                <div class="word-list">
                    <span>a funny</span><span>a scary</span><span>a goofy</span><span>a slimy</span>
                    <span>a barking</span><span>a fat</span>
                </div>
                <div class="selection-box" id="adjDisplay">How?</div>
            </div>
            <!-- col4 what-->
            <div class="column orange" id="col-4">
                <div class="col-num">4</div>
                <div class="word-list">
                    <span>goat</span><span>monkey</span><span>fish</span><span>cow</span>
                    <span>frog</span><span>bug</span><span>worm</span>
                </div>
                <div class="selection-box" id="n2Display">What?</div>
            </div>
            <!-- col5 where-->
            <div class="column pink" id="col-5">
                <div class="col-num">5</div>
                <div class="word-list">
                    <span>on the moon</span><span>on the chair</span><span>in my spaghetti</span>
                    <span>in my soup</span><span>on the grass</span><span>in my shoes</span>
                </div>
                <div class="selection-box" id="placeDisplay">Where?</div>
            </div>
        </div>
        <!-- spine -->
        <div class="spine"></div>
        <!-- right page -->
        <div class="page right-page">
            <div class="top-buttons">
                <button class="selector-btn purple-btn" id="btn1"></button>
                <button class="selector-btn cyan-btn" id="btn2"></button>
                <button class="selector-btn lime-btn" id="btn3"></button>
                <button class="selector-btn orange-btn" id="btn4"></button>
                <button class="selector-btn pink-btn" id="btn5"></button>
            </div>
            <!-- speaker grill -->
            <div class="speaker-grill">
                <div id="storyOutput">STORYMAKER</div>
            </div>

            <div class="main-controls">
                <div class="ctrl">
                    <button id="surpriseBtn" class="round-red"></button>
                    <label>surprises</label>
                </div>
                <div class="ctrl">
                    <button id="playbackBtn" class="round-teal"></button>
                    <label>playback</label>
                </div>
            </div>
            <!-- reset button -->
            <button id="resetBtn" class="reset-link">Reset Book</button>
        </div>
    </div>
</body>
</html>
